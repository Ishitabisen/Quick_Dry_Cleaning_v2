name: Trigger GAS on Pages Success

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

jobs:
  on_success:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: developer
    steps:
      - name: Trigger Google Apps Script
        run: |
          echo "Pages Deployment is LIVE. Refreshing Sheets..."
          curl -L "${{ secrets.GAS_URL_SHEET_A }}"
          curl -L "${{ secrets.GAS_URL_SHEET_B }}"
